<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kinic CLI Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17201c;
        background: #f7f8f6;
      }
      body {
        margin: 0;
      }
      main {
        width: min(560px, calc(100vw - 48px));
        margin: 48px auto;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 28px;
        font-weight: 650;
        letter-spacing: 0;
      }
      p {
        color: #52615a;
        line-height: 1.5;
      }
      dl {
        border: 1px solid #d7ddd8;
        border-radius: 6px;
        margin: 24px 0;
        padding: 12px 16px;
      }
      dt {
        color: #52615a;
        font-size: 13px;
        margin-top: 12px;
      }
      dt:first-child {
        margin-top: 0;
      }
      dd {
        margin: 4px 0 0;
        overflow-wrap: anywhere;
      }
      button {
        border: 1px solid #17201c;
        background: transparent;
        color: #17201c;
        border-radius: 6px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .error {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CLI login</h1>
      <p id="status">Preparing the CLI login request.</p>
      <dl id="request-details" hidden>
        <dt>Delegation recipient</dt>
        <dd>Local CLI callback</dd>
        <dt>Callback host/port</dt>
        <dd id="callback-host-port"></dd>
        <dt>Derivation origin</dt>
        <dd id="derivation-origin"></dd>
        <dt>Delegation TTL</dt>
        <dd id="delegation-ttl"></dd>
      </dl>
      <p id="error" class="error" hidden></p>
      <button id="login" type="button" disabled>Continue with Internet Identity</button>
    </main>
