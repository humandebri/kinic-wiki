name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  wikibrowser-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wikibrowser
    steps:
      - uses: actions/checkout@v5
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: wikibrowser/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run lint
        run: pnpm lint
      - name: Run typecheck
        run: pnpm typecheck
      - name: Build static export
        run: pnpm build
      - name: Build Cloudflare Worker
        run: pnpm build:worker

  wiki-generator-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/wiki-generator
    steps:
      - uses: actions/checkout@v5
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: workers/wiki-generator/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run tests
        run: cargo test --workspace --locked
      - name: Guard legacy wiki client aliases
        run: |
          ! rg -n '\b(WikiApi|CanisterWikiClient)\b' crates
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  cli-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-14
            name: macos-arm64
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Build CLI
        run: cargo build -p kinic-vfs-cli --bin kinic-vfs-cli --release --locked
      - name: Package CLI artifact
        run: bash scripts/package_kinic_vfs_cli.sh "v0.1.0" "${{ matrix.name }}" target/release/kinic-vfs-cli dist
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: kinic-vfs-cli-${{ matrix.name }}
          path: dist/*

  canister-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/wiki-clipper/package-lock.json
      - name: Install login page dependencies
        run: npm ci --prefix extensions/wiki-clipper
      - name: Check generated CLI login page
        run: |
          node scripts/build-icp-cli-login.mjs
          git diff --exit-code crates/vfs_canister/src/icp_cli_login.html
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install WASI sysroot
        run: sudo apt-get update && sudo apt-get install -y wasi-libc
      - name: Install wasm tooling
        run: cargo install wasi2ic ic-wasm --locked
      - name: Build canister artifact
        env:
          ICP_WASM_OUTPUT_PATH: /tmp/vfs_canister.wasm
        run: bash scripts/build-vfs-canister.sh

  extension-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/wiki-clipper
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/wiki-clipper/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
